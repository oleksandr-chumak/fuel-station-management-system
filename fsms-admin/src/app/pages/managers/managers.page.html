<app-create-manager-dialog #dialog (managerCreated)="handleManagerCreated($event)"></app-create-manager-dialog>
<p-panel [header]="'managers.title' | translate">
    <ng-template #icons>
        <p-button (onClick)="dialog.openDialog()" severity="secondary" [outlined]="true" [label]="'managers.createManager' | translate" />
    </ng-template>
    <app-manager-table
        [managers]="managers"
        [loading]="loading()"
        [showStatus]="true"
    />
</p-panel>
