<p-panel [header]="'fuelStations.title' | translate">
    <app-create-fuel-station-dialog #dialog></app-create-fuel-station-dialog>
    <ng-template #icons>
        <p-button severity="secondary" [outlined]="true" [label]="'common.create' | translate" (click)="dialog.openDialog()" />
    </ng-template>
    <app-fuel-station-table
        [fuelStations]="fuelStations"
        [loading]="loading()"
        (viewClicked)="viewFuelStation($event)"
    />
</p-panel>
