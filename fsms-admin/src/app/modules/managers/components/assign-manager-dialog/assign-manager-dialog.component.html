<p-dialog (visibleChange)="handleStateChange($event)" [visible]="open" [modal]="true" [style]="{ width: '480px' }" [header]="'managers.assignManagerDialogTitle' | translate">
    <form class="flex flex-col gap-4" [formGroup]="assignManagerForm" (submit)="handleFormSubmission()">
        <div class="flex flex-col gap-1">
            <app-manager-select (managerSelected)="handleMangerAssigned($event)"></app-manager-select>
            <p-message *ngIf="managerInvalid" severity="error" variant="simple" size="small">{{ 'managers.errors.managerInvalid' | translate }}</p-message>
        </div>
        <p-button type="submit" styleClass="w-full" [label]="'managers.assignManager' | translate" [loading]="loading()"/>
    </form>
</p-dialog>
