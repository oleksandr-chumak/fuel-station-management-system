<header>
    <div class="container mx-auto p-4">
        <div class="p-2 border-slate-200 border rounded-md">
            <div class="flex justify-between items-center">
                <button class="md:hidden flex items-center" (click)="toggleMobileMenu()">
                    <i class="pi pi-bars !text-3xl"></i>
                </button>

                <div class="font-bold text-xl">
                    {{ 'notLoggedInHeader.brand' | translate }}
                </div>

                <div class="flex items-center gap-3">
                    <div class="hidden md:flex gap-1">
                        <a *ngFor="let item of items"
                           [routerLink]="item.routerLink"
                           class="p-2 flex items-center hover:bg-slate-100 rounded-md transition-all">
                            <i *ngIf="item.icon" class="{{item.icon}} mr-2"></i>
                            <span>{{ item.translationKey | translate }}</span>
                        </a>
                    </div>
                    <p-selectbutton
                        [options]="languageOptions"
                        [ngModel]="currentLanguage"
                        (ngModelChange)="onLanguageChange($event)"
                        optionLabel="label"
                        optionValue="value"
                        [allowEmpty]="false"
                        size="small"
                    />
                </div>
            </div>
        </div>
    </div>

    <p-drawer [(visible)]="mobileMenuVisible" [position]="'left'" styleClass="p-sidebar-md" (onHide)="closeMobileMenu()">
        <h3 class="font-bold text-xl mb-4">{{ 'common.menu' | translate }}</h3>
        <div class="flex flex-col gap-4">
            <a *ngFor="let item of items"
               [routerLink]="item.routerLink"
               class="p-2 flex items-center hover:bg-slate-100 rounded-md transition-all"
               (click)="closeMobileMenu()">
                <i *ngIf="item.icon" class="{{item.icon}} mr-2"></i>
                <span>{{ item.translationKey | translate }}</span>
            </a>
            <div class="mt-4 pt-4 border-t border-slate-200">
                <p-selectbutton
                    [options]="languageOptions"
                    [ngModel]="currentLanguage"
                    (ngModelChange)="onLanguageChange($event)"
                    optionLabel="label"
                    optionValue="value"
                    [allowEmpty]="false"
                />
            </div>
        </div>
    </p-drawer>
</header>
