<p-panel [header]="'managers.assignedManagers' | translate">
    <p-table [value]="managers()" size="small" [loading]="loading()" [showLoader]="false"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>{{ 'common.id' | translate }}</th>
                <th>{{ 'managers.firstName' | translate }}</th>
                <th>{{ 'managers.lastName' | translate }}</th>
                <th>{{ 'managers.fullName' | translate }}</th>
            </tr>
        </ng-template>
        <ng-template #body let-manager>
            <tr>
                <td>{{ manager.managerId }}</td>
                <td>{{ manager.firstName }}</td>
                <td>{{ manager.lastName }}</td>
                <td>{{ manager.fullName }}</td>
            </tr>
        </ng-template>
        <ng-template #loadingbody>
            <tr *ngFor="let row of skeletonRows" style="height:46px">
                <td *ngFor="let col of skeletonCols">
                    <p-skeleton></p-skeleton>
                </td>
            </tr>
        </ng-template>
    </p-table>
</p-panel>
