@if (fuelStation(); as fs) {
    <p-panel [header]="'fuelPrices.title' | translate">
        <p-table [value]="fs.fuelPrices" size="small" [showLoader]="false" [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template #header>
                <tr>
                    <th>{{ 'fuelPrices.fuelGrade' | translate }}</th>
                    <th>{{ 'fuelPrices.pricePerLiter' | translate }}</th>
                </tr>
            </ng-template>
            <ng-template #body let-fuelPrice let-editing="editing" let-ri="rowIndex">
                <tr [pEditableRow]="fuelPrice">
                    <td><app-fuel-grade-label [grade]="fuelPrice.fuelGrade" /></td>
                    <td>{{ fuelPrice.pricePerLiter | money: fuelPrice.currency }}</td>
                </tr>
            </ng-template>
            <ng-template #loadingbody>
                <tr *ngFor="let row of skeletonRows" style="height:46px">
                    <td *ngFor="let col of skeletonCols">
                        <p-skeleton></p-skeleton>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-panel>
}
