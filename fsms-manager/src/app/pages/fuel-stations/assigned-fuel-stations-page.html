<p-panel [header]="'fuelStations.title' | translate">
    <p-table [value]="fuelStations()" size="small" [loading]="loading()" [showLoader]="false"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>{{ 'common.id' | translate }}</th>
                <th>{{ 'fuelStations.address' | translate }}</th>
                <th>{{ 'fuelStations.status' | translate }}</th>
                <th class="flex items-center justify-center">{{ 'common.action' | translate }}</th>
            </tr>
        </ng-template>
        <ng-template #body let-fuelStation>
            <tr>
                <td>{{ fuelStation.fuelStationId }}</td>
                <td>{{ fuelStation.address }}</td>
                <td><p-tag [value]="(fuelStation.active ? 'fuelStations.statusActive' : 'fuelStations.statusDeactivated') | translate" [severity]="getSeverity(fuelStation)" /></td>
                <td>
                    <div class="flex items-center justify-center">
                        <p-button (onClick)="handleViewClick(fuelStation.fuelStationId)" size="small" severity="secondary" [outlined]="true">{{ 'common.view' | translate }}</p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template #loadingbody>
            <tr *ngFor="let row of skeletonRows" style="height:46px">
                <td *ngFor="let col of skeletonCols">
                    <p-skeleton></p-skeleton>
                </td>
            </tr>
        </ng-template>
    </p-table>
</p-panel>
