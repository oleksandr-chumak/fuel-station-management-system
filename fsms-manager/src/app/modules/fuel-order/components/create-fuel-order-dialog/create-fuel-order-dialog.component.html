<p-dialog (visibleChange)="handleStateChange($event)" [visible]="open" [header]="'fuelOrders.createDialogTitle' | translate">
    <form class="flex flex-col gap-4" [formGroup]="createFuelOrderForm" (submit)="handleFormSubmission()">
        @if (!hasFuelGrades()) {
            <p-message severity="warn" variant="simple" size="small">
                {{ 'fuelOrders.noFuelTanksWarning' | translate }}
            </p-message>
        }
        <div class="flex flex-col gap-1">
            <p-select [options]="fuelGrades()" formControlName="fuelGrade" [placeholder]="'fuelOrders.selectFuelGrade' | translate" class="w-full" [disabled]="!hasFuelGrades()">
                <ng-template #selectedItem let-selectedOption>
                    <div *ngIf="selectedOption">{{ selectedOption.labelKey | translate }}</div>
                </ng-template>
                <ng-template let-fuelGrade #item>
                    <div>{{ fuelGrade.labelKey | translate }}</div>
                </ng-template>
            </p-select>
            <p-message *ngIf="fuelGradeInvalid" severity="error" variant="simple" size="small">{{ 'fuelOrders.fuelGradeInvalid' | translate }}</p-message>
        </div>
        <div class="flex flex-col gap-1">
            <p-input-number inputId="amount" suffix="L" formControlName="amount" [placeholder]="'fuelOrders.amountPlaceholder' | translate"></p-input-number>
            <p-message *ngIf="amountInvalid" severity="error" variant="simple" size="small">{{ 'fuelOrders.amountInvalid' | translate }}</p-message>
        </div>
        <p-button type="submit" styleClass="w-full" [label]="'fuelOrders.createSubmit' | translate" [loading]="loading()" [disabled]="!hasFuelGrades()"/>
    </form>
</p-dialog>
