<p-dialog (visibleChange)="handleStateChange($event)" [visible]="open" [header]="'fuelOrders.createDialogTitle' | translate" [style]="{ width: '40rem' }">
    @if (open) {
        <app-create-fuel-order-form
            [fuelStation]="fuelStation()"
            [loading]="loading()"
            (formSubmit)="handleSubmit($event)" />
    }
</p-dialog>
